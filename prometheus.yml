global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "/etc/prometheus/alerting_rules.yml"

scrape_configs:
  - job_name: 'notes-service'
    static_configs:
      - targets: ['host.docker.internal:8080']
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
      target: ['host.docker.internal:8080/health']
    static_configs:
      - targets: ['localhost']
    relabel_configs:
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115